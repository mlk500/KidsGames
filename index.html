<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>عالم الحيوانات - لعبة البطاقات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Welcome Screen -->
  <div id="welcome-screen" class="screen active">
    <div class="welcome-content">
      <div class="welcome-icon">🦁</div>
      <h1>عالم الحيوانات</h1>
      <p class="subtitle">هل تعرف الحيوان المفترس من الأليف؟</p>
      <button id="start-btn" class="big-btn bounce">ابدأ اللعب!</button>
      <div class="welcome-animals">
        <span>🐘</span><span>🐯</span><span>🐰</span><span>🦊</span><span>🐼</span>
      </div>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <!-- Score Bar -->
    <div class="score-bar">
      <div class="score-item">
        <span class="score-label">النتيجة</span>
        <span id="score" class="score-value">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">البطاقة</span>
        <span id="card-counter" class="score-value">1/10</span>
      </div>
      <div class="score-item stars" id="stars-container"></div>
    </div>

    <!-- Card Area -->
    <div class="card-container">
      <div id="animal-card" class="card">
        <div class="card-inner">
          <div class="card-front">
            <div class="card-image-wrapper">
              <img id="animal-image" src="" alt="">
              <div id="loading-spinner" class="spinner"></div>
            </div>
            <h2 id="animal-name" class="animal-name"></h2>
          </div>
          <div class="card-back">
            <div class="card-back-pattern">🐾</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Answer Buttons -->
    <div class="answer-buttons">
      <button id="btn-predator" class="answer-btn predator-btn">
        <span class="btn-icon">🦁</span>
        <span class="btn-text">مفترس</span>
      </button>
      <button id="btn-friendly" class="answer-btn friendly-btn">
        <span class="btn-icon">🐰</span>
        <span class="btn-text">أليف</span>
      </button>
    </div>

    <!-- Feedback Overlay -->
    <div id="feedback" class="feedback hidden">
      <div class="feedback-content">
        <div id="feedback-icon" class="feedback-icon"></div>
        <div id="feedback-text" class="feedback-text"></div>
        <div id="feedback-reason" class="feedback-reason"></div>
      </div>
    </div>
  </div>

  <!-- Results Screen -->
  <div id="results-screen" class="screen">
    <div class="results-content">
      <div id="results-icon" class="results-icon"></div>
      <h2 id="results-title"></h2>
      <div id="results-score" class="results-score"></div>
      <div id="results-stars" class="results-stars"></div>
      <button id="play-again-btn" class="big-btn bounce">العب مرة ثانية!</button>
      <button id="home-btn" class="big-btn secondary-btn">الصفحة الرئيسية</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/animals.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
