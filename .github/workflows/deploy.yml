name: Deploy Game
on:
  push:
    branches: [main] # or master
permissions:
  contents: write # This gives the action permission to push the deploy branch
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Create Config File 🛠️
        run: |
          echo "const PIXABAY_API_KEY = '${{ secrets.MY_PIXABAY_KEY }}';" > config.js

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          token: ${{ secrets.GITHUB_TOKEN }} # Uses the built-in token
